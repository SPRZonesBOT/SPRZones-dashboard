<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Status Dashboard</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ----- GLOBAL RESET & BACKGROUND (LegendPulse Style) ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 10% 20%, #0b0f1c, #05070e);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            /* Glowing orb effect in background */
            position: relative;
            overflow-x: hidden;
        }

        /* Background magic (LegendPulse wali feel) */
        body::before {
            content: '';
            position: absolute;
            top: -30%;
            left: -10%;
            width: 60%;
            height: 80%;
            background: radial-gradient(circle, rgba(0, 255, 255, 0.08), transparent 70%);
            filter: blur(80px);
            z-index: 0;
        }
        body::after {
            content: '';
            position: absolute;
            bottom: -20%;
            right: -10%;
            width: 50%;
            height: 70%;
            background: radial-gradient(circle, rgba(200, 0, 255, 0.08), transparent 70%);
            filter: blur(80px);
            z-index: 0;
        }

        /* ----- MAIN DASHBOARD CARD (Glassmorphism) ----- */
        .dashboard {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1300px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 48px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8), inset 0 0 0 1px rgba(255, 255, 255, 0.03);
            padding: 30px 35px 40px 35px;
            transition: all 0.3s ease;
        }

        /* ----- HEADER & TABS (Right aligned) ----- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #00f0ff, #a855f7);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
            color: #fff;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
        }

        .logo-text {
            color: #fff;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .logo-text span {
            color: #a855f7;
        }

        /* Tabs Container - RIGHT ALIGNED (fix karo) */
        .nav-tabs {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end; /* RIGHT side fix */
            width: auto;
        }

        .nav-tabs a {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 40px;
            transition: all 0.3s ease;
            letter-spacing: 0.3px;
            background: transparent;
            border: 1px solid transparent;
        }

        .nav-tabs a i {
            margin-right: 8px;
            font-size: 13px;
        }

        .nav-tabs a:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-tabs a.active {
            color: #fff;
            background: rgba(168, 85, 247, 0.15);
            border: 1px solid rgba(168, 85, 247, 0.2);
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.05);
        }

        /* "SPRZones" wali text hata di (delete) - ab kuch nahi dikhega */
        .hidden-badge {
            display: none;
        }

        /* ----- STATUS GRID (Teen projects) ----- */
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 10px;
        }

        .project-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 28px 24px 24px 24px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }

        .project-card:hover {
            transform: translateY(-6px);
            border-color: rgba(168, 85, 247, 0.2);
            background: rgba(255, 255, 255, 0.04);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.7);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .card-title {
            color: #fff;
            font-size: 17px;
            font-weight: 600;
            letter-spacing: -0.2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title i {
            color: #a855f7;
            font-size: 20px;
        }

        .status-badge {
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            background: rgba(255, 255, 255, 0.05);
            color: #aaa;
            border: 1px solid rgba(255, 255, 255, 0.05);
            white-space: nowrap;
        }

        .status-badge.online {
            background: rgba(0, 255, 170, 0.12);
            color: #00ffaa;
            border-color: rgba(0, 255, 170, 0.2);
            box-shadow: 0 0 20px rgba(0, 255, 170, 0.05);
        }

        .status-badge.offline {
            background: rgba(255, 70, 70, 0.12);
            color: #ff5555;
            border-color: rgba(255, 70, 70, 0.2);
        }

        .status-badge.warning {
            background: rgba(255, 200, 0, 0.12);
            color: #ffcc00;
            border-color: rgba(255, 200, 0, 0.2);
        }

        .card-details {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            line-height: 1.7;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            padding-top: 18px;
            margin-top: 5px;
        }

        .card-details i {
            width: 20px;
            color: rgba(255, 255, 255, 0.2);
            margin-right: 8px;
        }

        .refresh-area {
            display: flex;
            justify-content: flex-end;
            margin-top: 35px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            padding-top: 25px;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .refresh-btn {
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.2), rgba(0, 240, 255, 0.05));
            border: 1px solid rgba(168, 85, 247, 0.2);
            color: #fff;
            padding: 12px 32px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .refresh-btn:hover {
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.4), rgba(0, 240, 255, 0.1));
            border-color: #a855f7;
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.15);
            transform: scale(1.02);
        }

        .timestamp {
            color: rgba(255, 255, 255, 0.25);
            font-size: 13px;
            font-weight: 400;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
            .nav-tabs {
                justify-content: flex-start;
                width: 100%;
                overflow-x: auto;
                flex-wrap: nowrap;
                padding-bottom: 5px;
            }
            .nav-tabs a {
                font-size: 12px;
                padding: 6px 12px;
                white-space: nowrap;
            }
            .dashboard {
                padding: 20px;
                border-radius: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard">

        <!-- HEADER: Logo + Tabs (Right aligned) -->
        <div class="header">
            <div class="logo-area">
                <div class="logo-icon"><i class="fas fa-cubes"></i></div>
                <div class="logo-text">Project<span>Pulse</span></div>
            </div>
            <div class="nav-tabs">
                <!-- "SPRZones Financial Markets" delete kar diya, ab yeh saare tabs right mein fix hain -->
                <a href="#" class="active"><i class="fas fa-home"></i> Home</a>
                <a href="#"><i class="fas fa-chart-line"></i> Dashboard</a>
                <a href="#"><i class="fas fa-code-branch"></i> Crypto & Forex</a>
                <a href="#"><i class="fas fa-chart-bar"></i> Stocks</a>
                <a href="#"><i class="fas fa-history"></i> History</a>
                <a href="#" style="background: linear-gradient(135deg, #a855f7, #7c3aed); color: #fff; border: none; padding: 8px 20px;"><i class="fas fa-rocket"></i> Upgrade</a>
            </div>
        </div>

        <!-- GRID: Teen projects ki status -->
        <div class="status-grid" id="projectGrid">
            <!-- Cards JS se generate honge -->
        </div>

        <!-- Refresh Area -->
        <div class="refresh-area">
            <span class="timestamp" id="lastUpdated"><i class="far fa-clock"></i> Last updated: Just now</span>
            <button class="refresh-btn" onclick="checkAllStatus()"><i class="fas fa-sync-alt"></i> Refresh Status</button>
        </div>

    </div>

    <script>
        // ----- APNE ASLI PROJECTS YAHAN DAALO (URLs / GitHub Repo names) -----
        // Agar aapke paas Web URLs hain toh 'url' field mein daalo.
        // Agar GitHub Actions se status lena hai toh 'repo' field bhi daalo (main ne dono ka logic laga diya hai).
        const PROJECTS = [
            { 
                id: 1, 
                name: 'Shariah Screener', 
                icon: 'fa-shield-halved',
                url: 'https://your-api.com/screener/health', // Is URL ko ping karega
                repo: 'your-username/shariah-technical-screener' // GitHub repo (optional)
            },
            { 
                id: 2, 
                name: 'PEAD Earnings Agent', 
                icon: 'fa-bullhorn',
                url: 'https://your-api.com/pead/health',
                repo: 'your-username/pead-earnings-agent'
            },
            { 
                id: 3, 
                name: 'Market Alert Bot', 
                icon: 'fa-bell',
                url: 'https://your-api.com/alert/health',
                repo: 'your-username/Market-Alert-Bot'
            }
        ];

        // Agar aap GitHub Private repo use kar rahe toh PAT token yahan daalo (optional)
        const GITHUB_TOKEN = ''; // "" rakho agar public repo hai ya URL wala method use kar rahe ho

        // ----- Status Check karne wala function -----
        async function checkAllStatus() {
            const grid = document.getElementById('projectGrid');
            grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; color:rgba(255,255,255,0.5); padding:40px;"><i class="fas fa-spinner fa-spin"></i> Checking status...</div>`;

            const promises = PROJECTS.map(async (project) => {
                let status = 'offline';
                let message = 'Unreachable';
                let detail = '';

                try {
                    // 1. Pehle URL ping karte hain (agar URL diya hai)
                    if (project.url && project.url !== 'https://your-api.com/.../health') {
                        const response = await fetch(project.url, { 
                            method: 'GET',
                            headers: { 'Accept': 'application/json' },
                            signal: AbortSignal.timeout(5000) // 5 sec timeout
                        });
                        
                        if (response.ok) {
                            const data = await response.json().catch(() => ({}));
                            if (data.status === 'ok' || data.status === 'success' || response.status === 200) {
                                status = 'online';
                                message = '✅ Running Smoothly';
                            } else {
                                status = 'warning';
                                message = '⚠️ Running but status unknown';
                            }
                        } else {
                            status = 'offline';
                            message = `❌ HTTP ${response.status}`;
                        }
                    } 
                    // 2. Agar URL nahi diya, toh GitHub Action status check karo (agar repo diya hai)
                    else if (project.repo && project.repo !== 'your-username/...') {
                        const apiUrl = `https://api.github.com/repos/${project.repo}/actions/runs?per_page=1`;
                        const headers = GITHUB_TOKEN ? { 'Authorization': `token ${GITHUB_TOKEN}` } : {};
                        const res = await fetch(apiUrl, { headers });
                        if (res.ok) {
                            const json = await res.json();
                            if (json.workflow_runs && json.workflow_runs.length > 0) {
                                const last = json.workflow_runs[0];
                                if (last.conclusion === 'success') {
                                    status = 'online';
                                    message = '✅ Last build passed';
                                } else if (last.conclusion === 'failure') {
                                    status = 'offline';
                                    message = '❌ Last build failed';
                                } else {
                                    status = 'warning';
                                    message = `⏳ ${last.conclusion}`;
                                }
                                detail = `Commit: ${last.head_sha.substring(0,7)}`;
                            } else {
                                status = 'warning';
                                message = '⚠️ No workflow runs';
                            }
                        } else {
                            status = 'offline';
                            message = '❌ GitHub API error';
                        }
                    } else {
                        // Demo mode - dummy data dikhana (agar kuch configure nahi kiya)
                        status = 'online';
                        message = '✅ Demo Mode (Configure URLs)';
                    }

                } catch (error) {
                    status = 'offline';
                    message = '❌ Connection Timeout / Error';
                }

                // Extra detail (timestamp ya kuch)
                if (!detail) detail = new Date().toLocaleTimeString();

                return { ...project, status, message, detail };
            });

            const results = await Promise.all(promises);
            renderCards(results);
            document.getElementById('lastUpdated').innerHTML = `<i class="far fa-clock"></i> Last updated: ${new Date().toLocaleString()}`;
        }

        // ----- Cards Render karna -----
        function renderCards(projects) {
            const grid = document.getElementById('projectGrid');
            grid.innerHTML = '';

            projects.forEach(p => {
                const card = document.createElement('div');
                card.className = 'project-card';

                const statusClass = p.status === 'online' ? 'online' : (p.status === 'warning' ? 'warning' : 'offline');
                const statusIcon = p.status === 'online' ? 'fa-circle-check' : (p.status === 'warning' ? 'fa-triangle-exclamation' : 'fa-circle-xmark');

                card.innerHTML = `
                    <div class="card-header">
                        <div class="card-title">
                            <i class="fas ${p.icon}"></i> ${p.name}
                        </div>
                        <span class="status-badge ${statusClass}"><i class="fas ${statusIcon}"></i> ${p.status === 'online' ? 'Online' : (p.status === 'warning' ? 'Warning' : 'Offline')}</span>
                    </div>
                    <div style="color: #fff; font-size: 15px; font-weight: 500; margin-bottom: 8px;">
                        ${p.message}
                    </div>
                    <div class="card-details">
                        <div><i class="fas fa-code-fork"></i> Status: ${p.status.toUpperCase()}</div>
                        <div><i class="fas fa-clock"></i> Detail: ${p.detail || 'N/A'}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // ----- Page Load pe automatically check karo -----
        window.onload = function() {
            checkAllStatus();
            // Har 60 seconds mein auto-refresh
            setInterval(checkAllStatus, 60000);
        };
    </script>

</body>
</html>
