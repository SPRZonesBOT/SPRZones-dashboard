<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SPRZONES — Trading History</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0e17; color: #d1d5db; min-height: 100vh; }
        a { text-decoration: none; color: inherit; }

        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #0f1420;
            padding: 12px 32px;
            border-bottom: 1px solid #1e2a3a;
            flex-wrap: wrap;
        }
        .navbar .logo { font-size: 22px; font-weight: 900; color: #f0b90b; }
        .navbar .logo i { margin-right: 8px; }
        .navbar .menu {
            display: flex;
            gap: 28px;
            font-size: 14px;
            font-weight: 600;
            color: #8b95a9;
        }
        .navbar .menu a { transition: 0.2s; padding: 6px 0; border-bottom: 2px solid transparent; }
        .navbar .menu a:hover { color: #ffffff; border-bottom-color: #f0b90b; }
        .navbar .menu a.active { color: #f0b90b; border-bottom-color: #f0b90b; }
        .navbar .right { display: flex; align-items: center; gap: 16px; font-size: 13px; font-weight: 600; }
        .navbar .right .upgrade-btn { background: #f0b90b; color: #0a0e17; padding: 6px 16px; border-radius: 6px; font-weight: 700; }

        .page-header { padding: 40px 32px 20px; max-width: 1280px; margin: 0 auto; }
        .page-header h1 { font-size: 36px; font-weight: 800; color: #ffffff; }
        .page-header p { color: #8b95a9; font-size: 16px; margin-top: 6px; }

        .stats {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 32px 24px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 16px;
        }
        .stat-card {
            background: #0f1420;
            border: 1px solid #1e2a3a;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .stat-card .number { font-size: 28px; font-weight: 800; color: #f0b90b; }
        .stat-card .label { font-size: 13px; color: #8b95a9; margin-top: 4px; }

        .table-wrap {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 32px 60px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #0f1420;
            border-radius: 12px;
            overflow: hidden;
        }
        th {
            background: #1a1f2e;
            color: #8b95a9;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            padding: 12px 16px;
            text-align: left;
        }
        td {
            padding: 12px 16px;
            border-bottom: 1px solid #1a1f2e;
            font-size: 14px;
        }
        td .status { font-weight: 600; }
        td .status.win { color: #00c897; }
        td .status.loss { color: #ff6b6b; }
